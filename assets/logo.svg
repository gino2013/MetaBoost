<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 370" width="320" height="370">

  <!-- Curly tail (Shiba signature, right side) -->
  <path d="M 258 300 Q 308 265 308 210 Q 308 160 275 148 Q 252 142 248 162"
        fill="none" stroke="#1a1a1a" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 258 300 Q 308 265 308 210 Q 308 160 275 148 Q 252 142 248 162"
        fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Head shadow/body base -->
  <circle cx="152" cy="215" r="128" fill="#e8e8e8"/>

  <!-- Main head -->
  <circle cx="152" cy="210" r="128" fill="white" stroke="#1a1a1a" stroke-width="8"/>

  <!-- Left ear (outer) -->
  <path d="M 72 128 Q 42 52 100 28 Q 148 8 162 95"
        fill="white" stroke="#1a1a1a" stroke-width="8" stroke-linejoin="round" fill-rule="evenodd"/>
  <!-- Left ear (inner - light gray) -->
  <path d="M 82 122 Q 60 62 105 44 Q 142 28 153 98"
        fill="#d0d0d0"/>

  <!-- Right ear (outer) -->
  <path d="M 232 128 Q 262 52 204 28 Q 156 8 142 95"
        fill="white" stroke="#1a1a1a" stroke-width="8" stroke-linejoin="round"/>
  <!-- Right ear (inner) -->
  <path d="M 222 122 Q 244 62 199 44 Q 162 28 151 98"
        fill="#d0d0d0"/>

  <!-- Muzzle (Shiba's white snout area, slightly raised feel) -->
  <ellipse cx="152" cy="262" rx="68" ry="52" fill="#f2f2f2" stroke="#c8c8c8" stroke-width="3"/>

  <!-- LEFT EYE -->
  <!-- Outer white -->
  <circle cx="107" cy="200" r="30" fill="white" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Dark iris/pupil -->
  <circle cx="107" cy="203" r="20" fill="#111"/>
  <!-- Main shine (big white oval, upper-left) -->
  <ellipse cx="98" cy="194" rx="9" ry="7" fill="white"/>
  <!-- Secondary small shine -->
  <circle cx="118" cy="196" r="3.5" fill="white"/>

  <!-- RIGHT EYE -->
  <!-- Outer white -->
  <circle cx="197" cy="200" r="30" fill="white" stroke="#1a1a1a" stroke-width="6"/>
  <!-- Dark iris/pupil -->
  <circle cx="197" cy="203" r="20" fill="#111"/>
  <!-- Main shine -->
  <ellipse cx="188" cy="194" rx="9" ry="7" fill="white"/>
  <!-- Secondary small shine -->
  <circle cx="208" cy="196" r="3.5" fill="white"/>

  <!-- Shiba brow marks (small oval above each eye, very subtle) -->
  <ellipse cx="107" cy="170" rx="13" ry="5" fill="#aaa" transform="rotate(-8 107 170)"/>
  <ellipse cx="197" cy="170" rx="13" ry="5" fill="#aaa" transform="rotate(8 197 170)"/>

  <!-- Nose (small, cute button) -->
  <path d="M 138 242 Q 152 234 166 242 Q 160 256 152 258 Q 144 256 138 242 Z" fill="#1a1a1a"/>
  <!-- Nose highlight -->
  <ellipse cx="145" cy="242" rx="4" ry="3" fill="#555"/>

  <!-- Happy mouth -->
  <path d="M 136 262 Q 152 278 168 262"
        fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>

  <!-- Cheek blush (soft light circles for cuteness) -->
  <circle cx="70"  cy="242" r="26" fill="#e0e0e0" opacity="0.65"/>
  <circle cx="234" cy="242" r="26" fill="#e0e0e0" opacity="0.65"/>

  <!-- Left cheek whisker lines -->
  <line x1="25" y1="233" x2="62"  y2="237" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="246" x2="60"  y2="248" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="258" x2="63"  y2="257" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right cheek whisker lines -->
  <line x1="279" y1="233" x2="242" y2="237" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="282" y1="246" x2="244" y2="248" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="277" y1="258" x2="241" y2="257" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>

</svg>
