<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 400" width="320" height="400">

  <!-- Neck / upper chest (signals "dog portrait") -->
  <path d="M 105 372 Q 105 325 132 310 L 188 310 Q 215 325 215 372"
        fill="white" stroke="#111" stroke-width="7" stroke-linejoin="round"/>

  <!-- Head — wide at cheeks, slightly wedge-shaped like a real Shiba -->
  <path d="M 160 68
           C 215 62, 278 108, 280 178
           C 284 255, 248 322, 160 328
           C 72  322, 36  255, 40  178
           C 42  108, 105 62, 160 68 Z"
        fill="white" stroke="#111" stroke-width="8"/>

  <!-- LEFT EAR — small, compact triangle, slightly forward-tilting -->
  <path d="M 88 118 L 75 48 L 148 98 Z"
        fill="white" stroke="#111" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 94 114 L 84 58 L 141 100 Z" fill="#c0c0c0"/>

  <!-- RIGHT EAR — mirror of left -->
  <path d="M 232 118 L 245 48 L 172 98 Z"
        fill="white" stroke="#111" stroke-width="7" stroke-linejoin="round"/>
  <path d="M 226 114 L 236 58 L 179 100 Z" fill="#c0c0c0"/>

  <!-- Forehead shading (Shiba's orange fur zone = medium gray) -->
  <path d="M 108 132 Q 160 118 212 132 Q 222 162 212 188 Q 160 175 108 188 Q 98 162 108 132 Z"
        fill="#d8d8d8" opacity="0.9"/>

  <!-- URAJIRO — large white muzzle area, Shiba's #1 identifier -->
  <!-- Extends up to the cheeks on both sides -->
  <ellipse cx="160" cy="270" rx="95" ry="68" fill="#f6f6f6" stroke="#c0c0c0" stroke-width="3"/>

  <!-- Puffy cheeks (Shiba's fat cheeks) -->
  <ellipse cx="55"  cy="240" rx="32" ry="28" fill="#f0f0f0" stroke="#c8c8c8" stroke-width="2"/>
  <ellipse cx="265" cy="240" rx="32" ry="28" fill="#f0f0f0" stroke="#c8c8c8" stroke-width="2"/>

  <!-- Eye shadow patches above eyes (darker fur marking) -->
  <ellipse cx="118" cy="180" rx="26" ry="10" fill="#b8b8b8" transform="rotate(-10 118 180)"/>
  <ellipse cx="202" cy="180" rx="26" ry="10" fill="#b8b8b8" transform="rotate( 10 202 180)"/>

  <!-- LEFT EYE — almond-shaped, slightly squinted (Shiba smug look) -->
  <!-- Outer white of eye -->
  <path d="M 92 196 Q 118 178 144 196 Q 132 214 118 212 Q 104 214 92 196 Z"
        fill="white" stroke="#111" stroke-width="5"/>
  <!-- Iris/pupil, dark -->
  <ellipse cx="118" cy="197" rx="16" ry="13" fill="#111"/>
  <!-- Shine -->
  <ellipse cx="110" cy="191" rx="6" ry="5" fill="white"/>
  <!-- Lower lid line for squint character -->
  <path d="M 92 196 Q 118 208 144 196" fill="none" stroke="#111" stroke-width="3" opacity="0.4"/>

  <!-- RIGHT EYE — almond-shaped -->
  <path d="M 176 196 Q 202 178 228 196 Q 216 214 202 212 Q 188 214 176 196 Z"
        fill="white" stroke="#111" stroke-width="5"/>
  <ellipse cx="202" cy="197" rx="16" ry="13" fill="#111"/>
  <ellipse cx="194" cy="191" rx="6" ry="5" fill="white"/>
  <path d="M 176 196 Q 202 208 228 196" fill="none" stroke="#111" stroke-width="3" opacity="0.4"/>

  <!-- NOSE — wide, prominent Shiba nose (not a tiny dot!) -->
  <path d="M 132 238 Q 160 226 188 238 Q 184 260 160 264 Q 136 260 132 238 Z"
        fill="#0d0d0d"/>
  <!-- Nose highlight -->
  <ellipse cx="146" cy="240" rx="8" ry="6" fill="#555"/>

  <!-- MOUTH — Shiba's signature smug upturned smile -->
  <path d="M 128 270 Q 160 288 192 270"
        fill="none" stroke="#111" stroke-width="5" stroke-linecap="round"/>
  <!-- Corner-of-mouth lines (Shiba smile detail) -->
  <path d="M 128 270 L 120 278" stroke="#111" stroke-width="4" stroke-linecap="round"/>
  <path d="M 192 270 L 200 278" stroke="#111" stroke-width="4" stroke-linecap="round"/>

  <!-- Whisker lines -->
  <line x1="18"  y1="244" x2="58"  y2="246" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14"  y1="258" x2="56"  y2="257" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="302" y1="244" x2="262" y2="246" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="306" y1="258" x2="264" y2="257" stroke="#bbb" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Curly tail — Shiba's iconic curled tail, peeking from behind right side -->
  <path d="M 272 310 Q 318 272 314 228 Q 310 188 288 180 Q 272 175 268 190"
        fill="none" stroke="#111" stroke-width="18" stroke-linecap="round"/>
  <path d="M 272 310 Q 318 272 314 228 Q 310 188 288 180 Q 272 175 268 190"
        fill="none" stroke="white" stroke-width="9" stroke-linecap="round"/>

</svg>
