<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <style>
    .sketch { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Curly tail (Shiba's signature, like Ponytail's ponytail) -->
  <path d="M 300 310 Q 370 280 380 220 Q 390 160 345 140 Q 315 128 305 155"
        fill="none" stroke="black" stroke-width="18" class="sketch" stroke-linecap="round"/>
  <path d="M 300 310 Q 370 280 380 220 Q 390 160 345 140 Q 315 128 305 155"
        fill="none" stroke="white" stroke-width="9" class="sketch" stroke-linecap="round"/>

  <!-- Main head -->
  <path d="M 200 65 Q 285 55 325 130 Q 365 210 340 305 Q 315 390 200 400 Q 85 390 60 305 Q 35 210 75 130 Q 115 55 200 65 Z"
        fill="white" stroke="black" stroke-width="9" class="sketch"/>

  <!-- Left ear (outer) -->
  <path d="M 105 145 Q 68 70 105 30 Q 130 5 168 68 Q 155 100 130 125 Z"
        fill="white" stroke="black" stroke-width="8" class="sketch"/>
  <!-- Left ear (inner) -->
  <path d="M 112 138 Q 82 78 110 45 Q 128 22 160 75 Q 148 100 125 120 Z"
        fill="#d8d8d8"/>

  <!-- Right ear (outer) -->
  <path d="M 295 145 Q 332 70 295 30 Q 270 5 232 68 Q 245 100 270 125 Z"
        fill="white" stroke="black" stroke-width="8" class="sketch"/>
  <!-- Right ear (inner) -->
  <path d="M 288 138 Q 318 78 290 45 Q 272 22 240 75 Q 252 100 275 120 Z"
        fill="#d8d8d8"/>

  <!-- Left brow mark (Shiba characteristic) -->
  <ellipse cx="148" cy="188" rx="28" ry="10" fill="#333" transform="rotate(-12, 148, 188)"/>
  <!-- Right brow mark -->
  <ellipse cx="252" cy="188" rx="28" ry="10" fill="#333" transform="rotate(12, 252, 188)"/>

  <!-- Left eye dark patch -->
  <ellipse cx="148" cy="215" rx="36" ry="27" fill="#1a1a1a"/>
  <!-- Right eye dark patch -->
  <ellipse cx="252" cy="215" rx="36" ry="27" fill="#1a1a1a"/>

  <!-- Left eye white -->
  <ellipse cx="148" cy="216" rx="24" ry="17" fill="white"/>
  <!-- Left pupil -->
  <ellipse cx="148" cy="218" rx="16" ry="13" fill="#0d0d0d"/>
  <!-- Left eye shine -->
  <circle cx="141" cy="213" r="5" fill="white"/>

  <!-- Right eye white -->
  <ellipse cx="252" cy="216" rx="24" ry="17" fill="white"/>
  <!-- Right pupil -->
  <ellipse cx="252" cy="218" rx="16" ry="13" fill="#0d0d0d"/>
  <!-- Right eye shine -->
  <circle cx="245" cy="213" r="5" fill="white"/>

  <!-- Muzzle (lighter area) -->
  <ellipse cx="200" cy="305" rx="68" ry="52" fill="#f4f4f4" stroke="black" stroke-width="5" class="sketch"/>

  <!-- Nose -->
  <path d="M 176 272 Q 200 262 224 272 Q 218 292 200 295 Q 182 292 176 272 Z"
        fill="black"/>
  <!-- Nose highlight -->
  <ellipse cx="191" cy="273" rx="6" ry="4" fill="#666"/>

  <!-- Mouth -->
  <path d="M 188 298 Q 200 312 212 298"
        fill="none" stroke="black" stroke-width="5" class="sketch"/>

  <!-- Left cheek fur lines -->
  <path d="M 72 270 Q 84 263 94 272" fill="none" stroke="black" stroke-width="4" class="sketch"/>
  <path d="M 68 292 Q 82 284 93 293" fill="none" stroke="black" stroke-width="4" class="sketch"/>
  <path d="M 72 313 Q 85 306 95 315" fill="none" stroke="black" stroke-width="4" class="sketch"/>

  <!-- Forehead texture -->
  <circle cx="185" cy="152" r="3" fill="#aaa"/>
  <circle cx="200" cy="143" r="2.5" fill="#bbb"/>
  <circle cx="215" cy="152" r="3" fill="#aaa"/>
  <circle cx="193" cy="163" r="2" fill="#ccc"/>
  <circle cx="207" cy="163" r="2" fill="#ccc"/>

  <!-- Neck/chin area texture -->
  <path d="M 175 380 Q 200 392 225 380" fill="none" stroke="#ccc" stroke-width="3" class="sketch"/>
</svg>
